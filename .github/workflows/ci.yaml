name: CI tests

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - ".github/prompts/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - ".github/prompts/**"
  workflow_dispatch:

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get USERPROFILE and set CACHE_PATH
        shell: pwsh
        run: |
          $userProfile = [System.Environment]::GetEnvironmentVariable("USERPROFILE")
          $cachePath = Join-Path $userProfile ".nuget\packages"
          echo "CACHE_PATH=$cachePath" >> $env:GITHUB_ENV

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.nuget/packages
            ${{ env.CACHE_PATH }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.slnx') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore KoreaCmsEvidenceOptimizer.slnx

      - name: Build (net48)
        run: dotnet build src/KoreaCmsEvidenceOptimizer/KoreaCmsEvidenceOptimizer.csproj -f net48 -c Release --no-restore

      - name: Build (net10.0-windows)
        run: dotnet build src/KoreaCmsEvidenceOptimizer/KoreaCmsEvidenceOptimizer.csproj -f net10.0-windows -c Release --no-restore

      - name: Test (net48)
        run: dotnet test tests/KoreaCmsEvidenceOptimizer.Tests/KoreaCmsEvidenceOptimizer.Tests.csproj -f net48 -c Release --no-restore --logger "console;verbosity=normal"

      - name: Test (net10.0-windows)
        run: dotnet test tests/KoreaCmsEvidenceOptimizer.Tests/KoreaCmsEvidenceOptimizer.Tests.csproj -f net10.0-windows -c Release --no-restore --logger "console;verbosity=normal"

  trigger-auto-merge:
    runs-on: ubuntu-latest
    needs: build-test
    if: |
      github.event_name == 'pull_request' &&
      needs.build-test.result == 'success' &&
      github.actor == 'dependabot[bot]'
    permissions:
      actions: write
      contents: write
    steps:
      - name: Trigger auto-merge workflow
        uses: actions/github-script@v9
        with:
          script: |
            const prNumber = context.payload.pull_request.number;

            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'auto-merge-pr',
              client_payload: {
                pr_number: prNumber,
                triggered_by: 'ci-workflow',
                triggered_at: new Date().toISOString()
              }
            });

            console.log(`Triggered auto-merge workflow for PR #${prNumber}`);
